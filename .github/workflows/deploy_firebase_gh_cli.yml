name: Firebase Deploy with GitHub CLI

on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes for this build'
        required: true
        default: 'Triggered via GitHub CLI'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for GitHub CLI to create releases
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          echo "$GOOGLE_SERVICES_JSON" > composeApp/google-services.json

      - name: Build Debug APK
        run: ./gradlew :composeApp:assembleDebug

      - name: Get Build Info
        id: info
        run: |
          VERSION_TAG="v1.0.0-build-$(date +'%Y%m%d-%H%M')"
          echo "tag=$VERSION_TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release using CLI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Using the GitHub CLI (gh) to create a release and upload the APK
          # This allows you to track deployments in GitHub as well
          gh release create "${{ steps.info.outputs.tag }}" \
            composeApp/build/outputs/apk/debug/composeApp-debug.apk \
            --title "Firebase Build ${{ steps.info.outputs.tag }}" \
            --notes "${{ github.event.inputs.release_notes }}" \
            --target "${{ github.sha }}"

      - name: Deploy to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.CREDENTIAL_FILE_CONTENT }}
          groups: testers
          file: composeApp/build/outputs/apk/debug/composeApp-debug.apk
          releaseNotes: ${{ github.event.inputs.release_notes }}
