name: Continuous Integration

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run Android Unit Tests
        run: ./gradlew testDevDebugUnitTest --continue

      - name: Build Dev Debug APK
        run: ./gradlew :composeApp:assembleDevDebug

      - name: Upload Dev Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: dev-debug-apk
          path: composeApp/build/outputs/apk/dev/debug/*.apk
          if-no-files-found: ignore

  build-ios:
    name: Build iOS Kotlin targets
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Compile iOS Kotlin targets
        run: ./gradlew compileKotlinIosSimulatorArm64
